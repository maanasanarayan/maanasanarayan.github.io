<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>MN — Maanasa Narayan</title>
  <!-- Cycling sticker background -->
  <rect x="3" y="3" width="58" height="58" stroke="#000" stroke-width="6" fill="#FFD93D">
    <animate attributeName="fill"
             values="#FFD93D;#FF6B6B;#C4B5FD;#A7F3D0;#93C5FD;#FFD93D"
             dur="8s" repeatCount="indefinite" />
  </rect>
  <!-- Initials -->
  <text x="32" y="46"
        font-family="'Archivo Black','Helvetica Neue',Arial,sans-serif"
        font-size="34" font-weight="900" letter-spacing="-1"
        text-anchor="middle" fill="#000">MN</text>
  <!-- Pulsing accent dot, top-right corner -->
  <circle cx="55" cy="9" r="5" fill="#000">
    <animate attributeName="r" values="3.5;6.5;3.5" dur="1.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="55" cy="9" r="2" fill="#FFD93D">
    <animate attributeName="r" values="1.5;3;1.5" dur="1.6s" repeatCount="indefinite" />
  </circle>
</svg>
